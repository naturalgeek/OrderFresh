<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="cart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Shopping cart -->
  <g transform="translate(256, 270)">
    <!-- Cart body -->
    <path d="M-120,-40 L-100,-40 L-60,60 L100,60 L120,-20 L-40,-20"
          stroke="url(#cart)" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wheels -->
    <circle cx="-40" cy="90" r="18" fill="url(#cart)"/>
    <circle cx="80" cy="90" r="18" fill="url(#cart)"/>
  </g>
  <!-- Leaf on top -->
  <g transform="translate(310, 140) rotate(20)">
    <path d="M0,-60 C30,-60 60,-30 60,10 C60,35 45,55 20,55 C-5,55 -20,45 -30,25 C-40,5 -40,-20 -30,-40 C-20,-55 0,-60 0,-60 Z"
          fill="url(#leaf)"/>
    <path d="M5,-40 Q5,0 -15,35"
          stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M5,-20 Q15,-10 25,-15" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M0,5 Q12,15 20,10" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
