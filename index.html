<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OrderFresh</title>
    <meta name="description" content="Order groceries from your shopping lists" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/OrderFresh/manifest.json" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2e7d32" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/OrderFresh/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/OrderFresh/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/OrderFresh/icon-192.png" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OrderFresh" />

    <!-- Android PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/OrderFresh/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }

      // Auto-update: check for new version every 30 seconds
      (function() {
        var currentBuildTime = null;
        var checkInterval = 30000;

        function checkForUpdate() {
          fetch('/OrderFresh/version.json?t=' + Date.now())
            .then(function(res) { return res.json(); })
            .then(function(data) {
              if (currentBuildTime === null) {
                currentBuildTime = data.buildTime;
                console.log('App version:', data.version, 'Build:', new Date(data.buildTime).toISOString());
              } else if (data.buildTime !== currentBuildTime) {
                console.log('New version detected, reloading...');
                window.location.reload();
              }
            })
            .catch(function(err) {
              console.log('Version check failed:', err);
            });
        }

        setTimeout(checkForUpdate, 2000);
        setInterval(checkForUpdate, checkInterval);
      })();
    </script>
  </body>
</html>
